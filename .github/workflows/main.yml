name: Build & Release PyWarp

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to build and release"
        required: true
        default: "1.3.5"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt flake8

      - name: Run Flake8
        run: flake8 .

  # -------------------------
  # WINDOWS
  # -------------------------
  build-windows-x64:
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows x64
        shell: pwsh
        run: |
          pyinstaller `
            --name "PyWarp" `
            --onefile `
            --windowed `
            --icon=assets/logo.ico `
            --add-data "assets:assets" `
            --add-data "translations:translations" `
            --hidden-import=PySide6 `
            --collect-all=PySide6 `
            --distpath=dist `
            --specpath=build `
            --buildpath=build `
            --noupx `
            main.py

      - name: Rename and package executable
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          Move-Item -Path "dist/PyWarp.exe" -Destination "dist/pywarp-windows-x64-v$version.exe"
          Compress-Archive -Path "dist/pywarp-windows-x64-v$version.exe" `
            -DestinationPath "dist/pywarp-windows-x64-v$version.zip"

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-windows-x64
          path: dist/pywarp-windows-x64-v${{ github.event.inputs.version }}.zip

  # -------------------------
  # LINUX
  # -------------------------
  build-linux-x64:
    runs-on: ubuntu-22.04
    needs: validate
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux x64
        run: |
          pyinstaller \
            --name "pywarp-linux-x64-v${{ github.event.inputs.version }}" \
            --onefile \
            --add-data "assets:assets" \
            --add-data "translations:translations" \
            --hidden-import=PySide6 \
            --collect-all=PySide6 \
            --distpath=dist \
            --specpath=build \
            --buildpath=build \
            --noupx \
            main.py

      - name: Create tarball
        run: |
          cd dist
          tar -czvf "../pywarp-linux-x64-v${{ github.event.inputs.version }}.tar.gz" "pywarp-linux-x64-v${{ github.event.inputs.version }}"

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-linux-x64
          path: pywarp-linux-x64-v${{ github.event.inputs.version }}.tar.gz

  # -------------------------
  # MACOS ARM64
  # -------------------------
  build-macos-arm64:
    runs-on: macos-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS ARM64
        run: |
          pyinstaller \
            --name "PyWarp" \
            --onefile \
            --windowed \
            --icon=assets/logo.icns \
            --add-data "assets:assets" \
            --add-data "translations:translations" \
            --hidden-import=PySide6 \
            --collect-all=PySide6 \
            --distpath=dist \
            --specpath=build \
            --buildpath=build \
            --noupx \
            main.py

      - name: Create DMG
        run: |
          mkdir -p PyWarp.app/Contents/MacOS
          mkdir -p PyWarp.app/Contents/Resources
          
          mv dist/PyWarp PyWarp.app/Contents/MacOS/
          cp assets/logo.icns PyWarp.app/Contents/Resources/
          
          hdiutil create \
            -volname "PyWarp ARM64 v${{ github.event.inputs.version }}" \
            -srcfolder PyWarp.app \
            -format UDZO \
            -ov \
            -o "dist/pywarp-macos-arm64-v${{ github.event.inputs.version }}.dmg"

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-macos-arm64
          path: dist/pywarp-macos-arm64-v${{ github.event.inputs.version }}.dmg

  # -------------------------
  # MACOS INTEL
  # -------------------------
  build-macos-intel:
    runs-on: macos-13
    needs: validate
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS Intel
        run: |
          pyinstaller \
            --name "PyWarp" \
            --onefile \
            --windowed \
            --icon=assets/logo.icns \
            --add-data "assets:assets" \
            --add-data "translations:translations" \
            --hidden-import=PySide6 \
            --collect-all=PySide6 \
            --distpath=dist \
            --specpath=build \
            --buildpath=build \
            --noupx \
            main.py

      - name: Create DMG
        run: |
          mkdir -p PyWarp.app/Contents/MacOS
          mkdir -p PyWarp.app/Contents/Resources
          
          mv dist/PyWarp PyWarp.app/Contents/MacOS/
          cp assets/logo.icns PyWarp.app/Contents/Resources/
          
          hdiutil create \
            -volname "PyWarp Intel v${{ github.event.inputs.version }}" \
            -srcfolder PyWarp.app \
            -format UDZO \
            -ov \
            -o "dist/pywarp-macos-intel-v${{ github.event.inputs.version }}.dmg"

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-macos-intel
          path: dist/pywarp-macos-intel-v${{ github.event.inputs.version }}.dmg

  # -------------------------
  # UNIX INSTALLER SCRIPT
  # -------------------------
  build-unix-installer:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5

      - name: Prepare Installer
        run: |
          cp installers/mac-linux/pywarp-installer.sh pywarp-installer.sh
          chmod +x pywarp-installer.sh

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-unix-installer
          path: pywarp-installer.sh

  # -------------------------
  # RELEASE
  # -------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - build-windows-x64
      - build-linux-x64
      - build-macos-arm64
      - build-macos-intel
      - build-unix-installer

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Extract Changelog Section
        run: |
          VERSION="v${{ github.event.inputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver {flag=1; next}
            flag && /^## / {exit}
            flag {print}
          ' CHANGELOG.md > RELEASE_NOTES.md

      - name: Generate Checksums
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          VERSION="${{ github.event.inputs.version }}"
          TAG="v$VERSION"

          WIN_X64=$(find artifacts -name "*windows-x64*.zip" | head -n1 || true)
          LINUX_X64=$(find artifacts -name "*linux-x64*.tar.gz" | head -n1 || true)
          MAC_ARM_DMG=$(find artifacts -name "*macos-arm64*.dmg" | head -n1 || true)
          MAC_INTEL_DMG=$(find artifacts -name "*macos-intel*.dmg" | head -n1 || true)
          UNIX_INSTALLER=$(find artifacts -name "pywarp-installer.sh" | head -n1 || true)

          cat >> RELEASE_NOTES.md <<EOF

          ## 🧩 Downloads

          | Platform | Link |
          |----------|------|
          | **Windows x64** | [pywarp-windows-x64-v${VERSION}.zip](https://github.com/${REPO}/releases/download/${TAG}/pywarp-windows-x64-v${VERSION}.zip) |
          | **macOS ARM64** | [pywarp-macos-arm64-v${VERSION}.dmg](https://github.com/${REPO}/releases/download/${TAG}/pywarp-macos-arm64-v${VERSION}.dmg) |
          | **macOS Intel** | [pywarp-macos-intel-v${VERSION}.dmg](https://github.com/${REPO}/releases/download/${TAG}/pywarp-macos-intel-v${VERSION}.dmg) |
          | **Linux x64** | [pywarp-linux-x64-v${VERSION}.tar.gz](https://github.com/${REPO}/releases/download/${TAG}/pywarp-linux-x64-v${VERSION}.tar.gz) |
          | **Unix Installer** | [pywarp-installer.sh](https://github.com/${REPO}/releases/download/${TAG}/pywarp-installer.sh) |

          ## ⚡ Quick Install (Linux & macOS)

          \`\`\`bash
          curl -fsSL https://github.com/${REPO}/releases/download/${TAG}/pywarp-installer.sh | bash
          \`\`\`

          ## 🔐 Checksums

          EOF

          for file in "$WIN_X64" "$LINUX_X64" "$MAC_ARM_DMG" "$MAC_INTEL_DMG" "$UNIX_INSTALLER"
          do
            if [ -f "$file" ]; then
              sha=$(sha256sum "$file" | cut -d' ' -f1)
              name=$(basename "$file")
              echo "- **$name:** \`$sha\`" >> RELEASE_NOTES.md
            fi
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: PyWarp v${{ github.event.inputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*windows*.zip
            artifacts/**/*linux*.tar.gz
            artifacts/**/*macos*.dmg
            artifacts/**/pywarp-installer.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}