name: Build & Release PyWarp

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version to build and release"
        required: true
        default: "1.3.5"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt flake8

      - name: Run Flake8
        run: flake8 .

  # -------------------------
  # WINDOWS
  # -------------------------
  build-windows-x64:
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows x64
        shell: pwsh
        run: |
          pyinstaller `
            --name "PyWarp" `
            -F `
            -w `
            --icon=assets/logo.ico `
            --add-data "assets;assets" `
            --add-data "translations;translations" `
            --hidden-import=PySide6.QtCore `
            --hidden-import=PySide6.QtGui `
            --hidden-import=PySide6.QtWidgets `
            --collect-all=PySide6 `
            --distpath=dist `
            --specpath=. `
            --workpath=build `
            --noupx `
            main.py

      - name: Rename and package executable
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          Move-Item -Path "dist/PyWarp.exe" -Destination "dist/pywarp-windows-x64-v$version.exe"
          Compress-Archive -Path "dist/pywarp-windows-x64-v$version.exe" `
            -DestinationPath "dist/pywarp-windows-x64-v$version.zip"

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-windows-x64
          path: dist/pywarp-windows-x64-v${{ github.event.inputs.version }}.zip
          retention-days: 5

  # -------------------------
  # WINDOWS INSTALLER
  # -------------------------
  build-windows-installer:
    runs-on: windows-latest
    needs: build-windows-x64
    steps:
      - uses: actions/checkout@v5

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v5
        with:
          name: pywarp-windows-x64
          path: artifacts

      - name: Extract executable
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          Expand-Archive -Path "artifacts/pywarp-windows-x64-v$version.zip" -DestinationPath "extracted"

      - name: Copy installer files
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          
          New-Item -ItemType Directory -Path "installer/bin" -Force
          Copy-Item "extracted/pywarp-windows-x64-v$version.exe" "installer/bin/PyWarp.exe"
          Copy-Item "installers/windows/*" "installer/" -Recurse -Force

      - name: Create installer zip
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          Compress-Archive -Path "installer/*" `
            -DestinationPath "dist/pywarp-windows-installer-v$version.zip"

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-windows-installer
          path: dist/pywarp-windows-installer-v${{ github.event.inputs.version }}.zip
          retention-days: 5

  # -------------------------
  # LINUX
  # -------------------------
  build-linux-x64:
    runs-on: ubuntu-22.04
    needs: validate
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux x64
        run: |
          pyinstaller \
            --name "pywarp-linux-x64-v${{ github.event.inputs.version }}" \
            -F \
            --add-data "assets:assets" \
            --add-data "translations:translations" \
            --hidden-import=PySide6.QtCore \
            --hidden-import=PySide6.QtGui \
            --hidden-import=PySide6.QtWidgets \
            --collect-all=PySide6 \
            --distpath=dist \
            --specpath=. \
            --workpath=build \
            --noupx \
            main.py

      - name: Create tarball
        run: |
          cd dist
          tar -czvf "../pywarp-linux-x64-v${{ github.event.inputs.version }}.tar.gz" "pywarp-linux-x64-v${{ github.event.inputs.version }}"

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-linux-x64
          path: pywarp-linux-x64-v${{ github.event.inputs.version }}.tar.gz
          retention-days: 5

  # -------------------------
  # MACOS ARM64
  # -------------------------
  build-macos-arm64:
    runs-on: macos-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS ARM64
        run: |
          pyinstaller \
            --name "PyWarp" \
            -D \
            -w \
            --icon=assets/logo.icns \
            --add-data "assets:assets" \
            --add-data "translations:translations" \
            --hidden-import=PySide6.QtCore \
            --hidden-import=PySide6.QtGui \
            --hidden-import=PySide6.QtWidgets \
            --collect-all=PySide6 \
            --distpath=dist \
            --specpath=. \
            --workpath=build \
            --noupx \
            main.py

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "PyWarp ARM64 v${{ github.event.inputs.version }}" \
            -srcfolder "dist/PyWarp.app" \
            -format UDZO \
            -ov \
            -o "dist/pywarp-macos-arm64-v${{ github.event.inputs.version }}.dmg"

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-macos-arm64
          path: dist/pywarp-macos-arm64-v${{ github.event.inputs.version }}.dmg
          retention-days: 5

  # -------------------------
  # MACOS INTEL
  # -------------------------
  build-macos-intel:
    runs-on: macos-14
    needs: validate
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS Intel
        run: |
          pyinstaller \
            --name "PyWarp" \
            -D \
            -w \
            --icon=assets/logo.icns \
            --add-data "assets:assets" \
            --add-data "translations:translations" \
            --hidden-import=PySide6.QtCore \
            --hidden-import=PySide6.QtGui \
            --hidden-import=PySide6.QtWidgets \
            --collect-all=PySide6 \
            --distpath=dist \
            --specpath=. \
            --workpath=build \
            --noupx \
            main.py

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "PyWarp Intel v${{ github.event.inputs.version }}" \
            -srcfolder "dist/PyWarp.app" \
            -format UDZO \
            -ov \
            -o "dist/pywarp-macos-intel-v${{ github.event.inputs.version }}.dmg"

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-macos-intel
          path: dist/pywarp-macos-intel-v${{ github.event.inputs.version }}.dmg
          retention-days: 5

  # -------------------------
  # UNIX INSTALLER SCRIPT
  # -------------------------
  build-unix-installer:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5

      - name: Prepare Installer
        run: |
          cp installers/mac-linux/pywarp-installer.sh pywarp-installer.sh
          chmod +x pywarp-installer.sh

      - uses: actions/upload-artifact@v5
        with:
          name: pywarp-unix-installer
          path: pywarp-installer.sh
          retention-days: 5

  # -------------------------
  # RELEASE
  # -------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - build-windows-x64
      - build-windows-installer
      - build-linux-x64
      - build-macos-arm64
      - build-macos-intel
      - build-unix-installer

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Extract Changelog Section
        run: |
          VERSION="v${{ github.event.inputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver {flag=1; next}
            flag && /^## / {exit}
            flag {print}
          ' CHANGELOG.md > RELEASE_NOTES.md || echo "## Release Notes" > RELEASE_NOTES.md

      - name: Generate Checksums
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          VERSION="${{ github.event.inputs.version }}"
          TAG="v$VERSION"

          WIN_X64=$(find artifacts -name "*windows-x64*.zip" | head -n1 || true)
          LINUX_X64=$(find artifacts -name "*linux-x64*.tar.gz" | head -n1 || true)
          MAC_ARM_DMG=$(find artifacts -name "*macos-arm64*.dmg" | head -n1 || true)
          MAC_INTEL_DMG=$(find artifacts -name "*macos-intel*.dmg" | head -n1 || true)
          UNIX_INSTALLER=$(find artifacts -name "pywarp-installer.sh" | head -n1 || true)
          WIN_INSTALLER=$(find artifacts -name "*windows-installer*.zip" | head -n1 || true)

          cat >> RELEASE_NOTES.md <<'EOF'

          ---

          ## 🎯 Downloads

          ### 🪟 Windows
          | Version | Download |
          |---------|----------|
          | **x64 (Portable)** | [![Download](https://img.shields.io/badge/Download-PyWarp%20Portable-0078D4?style=for-the-badge&logo=windows&logoColor=white)](https://github.com/REPO/releases/download/TAG/pywarp-windows-x64-vVERSION.zip) |
          | **Installer** | [![Download](https://img.shields.io/badge/Download-PyWarp%20Installer-107C10?style=for-the-badge&logo=windows&logoColor=white)](https://github.com/REPO/releases/download/TAG/pywarp-windows-installer-vVERSION.zip) |

          ### 🍎 macOS
          | Architecture | Download |
          |--------------|----------|
          | **ARM64 (Apple Silicon)** | [![Download](https://img.shields.io/badge/Download-PyWarp%20ARM64-555555?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/REPO/releases/download/TAG/pywarp-macos-arm64-vVERSION.dmg) |
          | **Intel (x64)** | [![Download](https://img.shields.io/badge/Download-PyWarp%20Intel-555555?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/REPO/releases/download/TAG/pywarp-macos-intel-vVERSION.dmg) |

          ### 🐧 Linux
          | Format | Download |
          |--------|----------|
          | **x64 (Portable)** | [![Download](https://img.shields.io/badge/Download-PyWarp%20Portable-FCC624?style=for-the-badge&logo=linux&logoColor=FCC624&labelColor=555555)](https://github.com/REPO/releases/download/TAG/pywarp-linux-x64-vVERSION.tar.gz) |
          | **Installer Script** | [![Download](https://img.shields.io/badge/Download-Install%20Script-FCC624?style=for-the-badge&logo=linux&logoColor=FCC624&labelColor=555555)](https://github.com/REPO/releases/download/TAG/pywarp-installer.sh) |

          ---

          ## ⚡ Quick Start

          ### 🪟 Windows
          1. Download the **Portable** or **Installer** version
          2. Extract/Run the executable
          3. Cloudflare WARP will be installed automatically if needed

          ### 🍎 macOS
          1. Download the `.dmg` file for your architecture
          2. Open the DMG and drag PyWarp to Applications
          3. Run PyWarp from Applications folder

          ### 🐧 Linux
          **Automatic Installation (Recommended):**
          ```bash
          curl -fsSL https://github.com/REPO/releases/download/TAG/pywarp-installer.sh | bash
          ```

          **Or manually:**
          1. Download the tar.gz file
          2. Extract: `tar -xzvf pywarp-linux-x64-vVERSION.tar.gz`
          3. Run: `./pywarp-linux-x64-vVERSION/pywarp-linux-x64-vVERSION`

          ---

          ## 🔐 Checksums (SHA256)

          EOF

          # Replace placeholders with actual values
          sed -i "s|REPO|${REPO}|g" RELEASE_NOTES.md
          sed -i "s|TAG|${TAG}|g" RELEASE_NOTES.md
          sed -i "s|VERSION|${VERSION}|g" RELEASE_NOTES.md

          # Add checksums
          echo "" >> RELEASE_NOTES.md
          for file in "$WIN_X64" "$WIN_INSTALLER" "$LINUX_X64" "$MAC_ARM_DMG" "$MAC_INTEL_DMG" "$UNIX_INSTALLER"
          do
            if [ -f "$file" ]; then
              sha=$(sha256sum "$file" | cut -d' ' -f1)
              name=$(basename "$file")
              echo "- **$name**" >> RELEASE_NOTES.md
              echo "  \`$sha\`" >> RELEASE_NOTES.md
              echo "" >> RELEASE_NOTES.md
            fi
          done

          echo "" >> RELEASE_NOTES.md
          echo "---" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### System Requirements" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "- **Windows:** Windows 10/11 (64-bit)" >> RELEASE_NOTES.md
          echo "- **macOS:** macOS 11+ (Big Sur or later)" >> RELEASE_NOTES.md
          echo "- **Linux:** Ubuntu 20.04+, Fedora 33+, Debian 11+ (or compatible)" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Features ✨" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "- 🔒 Full VPN tunnel via Cloudflare WARP" >> RELEASE_NOTES.md
          echo "- 🌐 DNS over HTTPS (DoH) & DNS over TLS (DoT)" >> RELEASE_NOTES.md
          echo "- 🔄 Switch between WireGuard & MASQUE protocols" >> RELEASE_NOTES.md
          echo "- ⚡ Real-time connection statistics" >> RELEASE_NOTES.md
          echo "- 🛡️ Advanced DNS filtering options" >> RELEASE_NOTES.md
          echo "- 🌍 Multi-language support" >> RELEASE_NOTES.md
          echo "- 📊 Live DNS logs viewer" >> RELEASE_NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: PyWarp v${{ github.event.inputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*windows*.zip
            artifacts/**/*linux*.tar.gz
            artifacts/**/*macos*.dmg
            artifacts/**/pywarp-installer.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}